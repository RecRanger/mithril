wallet_address = "48y3RCT5SzSS4jumHm9rRL91eWWzd6xcVGSCF1KUZGWYJ6npqwFxHee4xkLLNUqY4NjiswdJhxFALeRqzncHoToeJMg2bhL"
pool_password = "x"

[worker]
num_threads = 8

# If enabled, finds the best configuration for the hardware
# via a multi-armed bandit algorithm. If this is enabled
# the num_threads settings is ignored.
auto_tune = true

# Minutes how long a arm is evaluated before a new aarm is drawn.
auto_tune_interval_minutes = 15

auto_tune_log = "./bandit.log"

[donation]
# Percentage mining to address that supports the project. Set to 0 to disable.
percentage = 2.5
